<style>
  :root {
    --bg:       #0b0d14;
    --surface:  #12151f;
    --surface2: #181c29;
    --surface3: #1e2235;
    --border:   #252a3d;
    --border2:  #2e3450;
    --accent:   #4f80ff;
    --green:    #00d084;
    --yellow:   #ffb800;
    --red:      #ff4d4d;
    --purple:   #9b59f7;
    --orange:   #ff7a30;
    --pink:     #f736a8;
    --text:     #ffffff;
    --text2:    #c8cfe8;
    --muted:    #5a6380;
    --muted2:   #8892b0;
    --radius:   14px;
    --radius-sm:8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 64px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 200;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-img { width: 32px; height: 32px; object-fit: contain; }
  .header-brand { display: flex; flex-direction: column; gap: 1px; }
  .header-brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .header-brand-sub  { font-size: 11px; color: var(--muted2); }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,208,132,0.12); border: 1px solid rgba(0,208,132,0.3);
    color: var(--green); padding: 5px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .last-updated { font-size: 12px; color: var(--muted); }

  /* ── FILTERS BAR ── */
  .filters {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .filter-group { display: flex; flex-direction: column; gap: 5px; }
  .filter-label { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.9px; font-weight: 600; }
  select, input[type="number"] {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); padding: 0 12px; height: 36px;
    border-radius: var(--radius-sm); font-family: 'Inter', sans-serif;
    font-size: 13px; outline: none; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  select:hover, select:focus, input:hover, input:focus { border-color: var(--accent); background: var(--surface3); }
  input[type="number"] { width: 80px; cursor: text; -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .input-suffix-wrap { display: flex; align-items: center; }
  .input-suffix-wrap input { border-radius: var(--radius-sm) 0 0 var(--radius-sm); border-right: none; }
  .suffix-box {
    height: 36px; padding: 0 10px; background: var(--surface3);
    border: 1px solid var(--border2); border-left: none;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    display: flex; align-items: center; font-size: 13px; color: var(--muted2);
  }
  .btn { height: 36px; padding: 0 16px; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 7px; transition: opacity 0.2s, transform 0.1s; }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); }

  /* ── MAIN ── */
  .main { padding: 28px 32px; display: flex; flex-direction: column; gap: 28px; }

  /* ── KPI GRID ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--kpi-color, var(--accent));
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .kpi-card:hover { border-color: var(--kpi-color, var(--accent)); transform: translateY(-2px); }
  .kpi-label { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.9px; font-weight: 600; }
  .kpi-value { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; letter-spacing: -1px; white-space: nowrap; }
  .kpi-value span.currency { font-size: 16px; font-weight: 600; color: var(--muted2); margin-right: 3px; vertical-align: 0.25em; }
  .kpi-sub { font-size: 12px; color: var(--muted); }

  /* ── SECTION TITLE ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title  { font-size: 12px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 1px; }

  /* ── VENDEDOR GRID ── */
  .vendedor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
  .vendedor-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color 0.2s, transform 0.15s; cursor: pointer;
    display: flex; flex-direction: column;
  }
  .vendedor-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .vendedor-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
  }
  .vendedor-name { font-weight: 700; font-size: 15px; }
  .vendedor-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(79,128,255,0.15); color: var(--accent); font-weight: 600; }

  /* Stats row */
  .vendedor-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat-item { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; font-weight: 600; }
  .stat-value { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: baseline; gap: 2px; }
  .stat-value .cur { font-size: 10px; color: var(--muted2); font-weight: 500; }
  .stat-value.green { color: var(--green); }
  .stat-value.accent { color: var(--accent); }

  /* ── CONV BARS ── */
  .conv-block { display: flex; flex-direction: column; gap: 9px; }
  .conv-block-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
  .conv-row { display: flex; flex-direction: column; gap: 4px; }
  .conv-head { display: flex; justify-content: space-between; align-items: baseline; }
  .conv-label { font-size: 12px; color: var(--text2); }
  .conv-right { display: flex; align-items: baseline; gap: 6px; }
  .conv-pct   { font-size: 13px; font-weight: 700; color: var(--text); }
  .conv-ratio { font-size: 10px; color: var(--muted); }

  .bar-wrap { position: relative; height: 12px; }
  .bar-bg   { height: 12px; background: var(--surface3); border-radius: 8px; overflow: visible; position: relative; }
  .bar-fill { height: 100%; border-radius: 8px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
  .fill-bh       { background: linear-gradient(90deg,#2d4fd4,#4f80ff); }
  .fill-interior { background: linear-gradient(90deg,#00a36a,#00d084); }
  .fill-fora     { background: linear-gradient(90deg,#cc8800,#ffb800); }
  .fill-meta     { background: linear-gradient(90deg,#c0197a,#f736a8); }
  .fill-disparo  { background: linear-gradient(90deg,#c45a1a,#ff7a30); }
  .fill-organico { background: linear-gradient(90deg,#5e35b1,#9b59f7); }
  .fill-outros   { background: linear-gradient(90deg,#374151,#6b7280); }
  .meta-marker {
    position: absolute; top: -3px; width: 2px; height: 18px;
    background: rgba(255,255,255,0.45); border-radius: 2px;
    transform: translateX(-50%); pointer-events: none; z-index: 2;
    transition: left 0.3s ease;
  }
  .meta-marker::after {
    content:''; position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
    width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.7);
  }

  .vendedor-footer {
    padding: 11px 18px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ver-vendas { font-size: 12px; color: var(--accent); font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .footer-meta { font-size: 11px; color: var(--muted); }

  /* ── MODAL CONVERSÕES ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 1000;
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); width: 100%; max-width: 780px;
    max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--border);
  }
  .modal-title    { font-weight: 700; font-size: 16px; }
  .modal-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .modal-close {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 20px; line-height: 1; padding: 4px;
    border-radius: 6px; transition: color 0.15s, background 0.15s;
  }
  .modal-close:hover { color: var(--text); background: var(--surface3); }
  .modal-body { overflow-y: auto; flex: 1; }

  /* Modal conversões — grid */
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .meta-group { padding: 20px 24px; }
  .meta-group:first-child { border-right: 1px solid var(--border); }
  .meta-group-title { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.9px; font-weight: 700; margin-bottom: 16px; }
  .meta-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .meta-row-label { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .meta-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .meta-input-wrap { display: flex; align-items: center; gap: 0; }
  .meta-input {
    width: 72px; height: 32px; padding: 0 10px;
    background: var(--surface3); border: 1px solid var(--border2);
    color: var(--text); font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
    border-radius: var(--radius-sm) 0 0 var(--radius-sm); border-right: none;
    outline: none; transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .meta-input::-webkit-inner-spin-button,
  .meta-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .meta-input:focus { border-color: var(--accent); }
  .meta-suffix-sm {
    height: 32px; padding: 0 8px; background: var(--surface2);
    border: 1px solid var(--border2); border-left: none;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    display: flex; align-items: center; font-size: 12px; color: var(--muted2);
  }

  /* Tabela vendas */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 12px 20px; text-align: left; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.9px; font-weight: 700;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 12px 20px; font-size: 13px; }
  td.green { color: var(--green); font-weight: 700; }
  td.muted  { color: var(--muted2); }

  .tag { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .tag-bh       { background: rgba(79,128,255,0.15); color: var(--accent); }
  .tag-interior { background: rgba(0,208,132,0.15); color: var(--green); }
  .tag-fora     { background: rgba(255,184,0,0.15); color: var(--yellow); }
  .tag-outros   { background: rgba(90,99,128,0.15); color: var(--muted2); }

  /* Loading */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 80px; color: var(--muted); }
  .spinner { width: 30px; height: 30px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px; color: var(--muted); }
  .empty strong { display: block; font-size: 16px; margin-bottom: 8px; color: var(--muted2); }

  @media (max-width: 640px) {
    .header, .filters, .main { padding-left: 16px; padding-right: 16px; }
    .meta-grid { grid-template-columns: 1fr; }
    .meta-group:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwzzvjTdpjpFV9QrBG0bIL1NFaKYTkrPt4QeX-MktgGlWe5cSUAaGESSXt5Vhapucc0/exec";

let dadosGlobais = [];

// Metas por canal — carregadas da planilha (aba config), compartilhadas entre todos
let metas = { meta_bh: 20, meta_interior: 20, meta_fora: 20, meta_meta: 20, meta_disparo: 20, meta_organico: 20, meta_outros: 10 };

async function carregarConfig() {
  try {
    const res  = await fetch(API_URL + '?acao=config');
    const data = await res.json();
    if (data && typeof data === 'object') {
      metas = { ...metas, ...Object.fromEntries(
        Object.entries(data).map(([k, v]) => [k, Number(v) || 20])
      )};
    }
  } catch(e) { console.warn('Erro ao carregar config:', e.message); }
}

async function salvarConfigRemoto(senha) {
  const res  = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ tipo: 'config', senha, metas }),
  });
  return await res.json();
}

// ── FORMATOS ──
function formatMoeda(v) {
  if (v == null || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return '—';
  return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function moedaHtml(v) {
  if (v == null || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return '—';
  return '<span class="cur">R$</span>' + formatMoeda(n);
}
function formatPct(v) {
  if (!v && v !== 0) return '0%';
  return Number(v).toFixed(1) + '%';
}
function formatMesAno(s) {
  if (!s || s === '0000-00') return '—';
  const [y, m] = s.split('-');
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return meses[parseInt(m) - 1] + ' ' + y;
}
function formatData(s) {
  if (!s) return '—';
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString('pt-BR');
}
function tagRegiao(r) {
  if (r === 'BH')            return '<span class="tag tag-bh">BH</span>';
  if (r === 'Interior MG')   return '<span class="tag tag-interior">Interior MG</span>';
  if (r === 'Fora do Estado')return '<span class="tag tag-fora">Fora do Estado</span>';
  return '<span class="tag tag-outros">—</span>';
}

// ── CARREGA ──
async function carregarDados() {
  document.getElementById('mainContent').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>Carregando dados...</span></div>';
  try {
    // Carrega metas e dados em paralelo
    const [resData] = await Promise.all([
      fetch(API_URL + '?acao=dashboard'),
      carregarConfig(),
    ]);
    const data = await resData.json();
    dadosGlobais = data;
    document.getElementById('lastUpdated').textContent = 'atualizado às ' + new Date().toLocaleTimeString('pt-BR');

    const vendedores = [...new Set(data.map(d => d.vendedor))].filter(Boolean).sort();
    const periodos   = [...new Set(data.map(d => d.mes_ano))].filter(d => d && d !== '0000-00').sort().reverse();

    const selV = document.getElementById('filtroVendedor');
    const selP = document.getElementById('filtroPeriodo');
    const curV = selV.value;
    const curP = selP.value;

    selV.innerHTML = '<option value="todos">Todos os vendedores</option>' +
      vendedores.map(v => '<option value="' + v + '"' + (v === curV ? ' selected' : '') + '>' + v + '</option>').join('');
    selP.innerHTML = '<option value="todos">Todo o período</option>' +
      periodos.map(p => '<option value="' + p + '"' + (p === curP ? ' selected' : '') + '>' + formatMesAno(p) + '</option>').join('');

    renderizar();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty"><strong>Erro ao carregar dados</strong><span>' + e.message + '</span></div>';
  }
}

// ── FILTRA / AGREGA ──
function dadosFiltrados() {
  const v = document.getElementById('filtroVendedor').value;
  const p = document.getElementById('filtroPeriodo').value;
  return dadosGlobais.filter(d =>
    (v === 'todos' || d.vendedor === v) &&
    (p === 'todos' || d.mes_ano === p)
  );
}
function agregar(rows) {
  return rows.reduce((a, d) => {
    a.num_vendas           += +d.num_vendas           || 0;
    a.valor_vendido        += +d.valor_vendido        || 0;
    a.num_vendas_qualif    += +d.num_vendas_qualif    || 0;
    a.valor_vendido_qualif += +d.valor_vendido_qualif || 0;
    a.leads_bh             += +d.leads_bh             || 0;
    a.leads_interior       += +d.leads_interior       || 0;
    a.leads_fora           += +d.leads_fora           || 0;
    a.vendas_bh            += +d.vendas_bh            || 0;
    a.vendas_interior      += +d.vendas_interior      || 0;
    a.vendas_fora          += +d.vendas_fora          || 0;
    a.leads_meta           += +d.leads_meta           || 0;
    a.leads_disparo        += +d.leads_disparo        || 0;
    a.leads_organico       += +d.leads_organico       || 0;
    a.leads_outros_origem  += +d.leads_outros_origem  || 0;
    a.vendas_meta          += +d.vendas_meta          || 0;
    a.vendas_disparo       += +d.vendas_disparo       || 0;
    a.vendas_organico      += +d.vendas_organico      || 0;
    a.vendas_outros_origem += +d.vendas_outros_origem || 0;
    return a;
  }, {
    num_vendas:0, valor_vendido:0, num_vendas_qualif:0, valor_vendido_qualif:0,
    leads_bh:0, leads_interior:0, leads_fora:0,
    vendas_bh:0, vendas_interior:0, vendas_fora:0,
    leads_meta:0, leads_disparo:0, leads_organico:0, leads_outros_origem:0,
    vendas_meta:0, vendas_disparo:0, vendas_organico:0, vendas_outros_origem:0,
  });
}
function pct(v, l) { return l > 0 ? (v / l * 100) : 0; }

// ── BARRA PADRÃO (% conversão) — clicável por origem ──
function barRow(label, pctVal, fillClass, vendas, leads, metaVal, vendedor, periodo, origem) {
  const escala     = Math.max(pctVal, metaVal, 1) * 1.25;
  const fillW      = Math.min((pctVal / escala) * 100, 100).toFixed(1);
  const markerLeft = Math.min((metaVal / escala) * 100, 100).toFixed(1);
  const clickable  = origem ? 'style="cursor:pointer" onclick="event.stopPropagation();abrirVendasOrigem(\'' + vendedor.replace(/'/g,"\\'") + '\',\'' + periodo + '\',\'' + origem + '\')"' : '';
  return [
    '<div class="conv-row" ' + clickable + '>',
      '<div class="conv-head">',
        '<span class="conv-label">' + label + (origem ? ' <span style="font-size:9px;color:var(--accent);margin-left:4px">↗</span>' : '') + '</span>',
        '<div class="conv-right">',
          '<span class="conv-pct">' + formatPct(pctVal) + '</span>',
          '<span class="conv-ratio">' + vendas + '/' + leads + '</span>',
        '</div>',
      '</div>',
      '<div class="bar-wrap">',
        '<div class="bar-bg">',
          '<div class="bar-fill ' + fillClass + '" style="width:' + fillW + '%"></div>',
        '</div>',
        '<div class="meta-marker" style="left:' + markerLeft + '%" title="Meta: ' + metaVal + '%"></div>',
      '</div>',
    '</div>'
  ].join('');
}

// ── BARRA ABSOLUTA (nº de vendas vs meta) — clicável ──
function barRowAbsoluto(label, vendas, fillClass, metaVendas, vendedor, periodo, origem) {
  const escala     = Math.max(vendas, metaVendas, 1) * 1.25;
  const fillW      = Math.min((vendas / escala) * 100, 100).toFixed(1);
  const markerLeft = Math.min((metaVendas / escala) * 100, 100).toFixed(1);
  const clickable  = origem ? 'style="cursor:pointer" onclick="event.stopPropagation();abrirVendasOrigem(\'' + vendedor.replace(/'/g,"\\'") + '\',\'' + periodo + '\',\'' + origem + '\')"' : '';
  return [
    '<div class="conv-row" ' + clickable + '>',
      '<div class="conv-head">',
        '<span class="conv-label">' + label + (origem ? ' <span style="font-size:9px;color:var(--accent);margin-left:4px">↗</span>' : '') + '</span>',
        '<div class="conv-right">',
          '<span class="conv-pct">' + vendas + '</span>',
          '<span class="conv-ratio">meta ' + metaVendas + '</span>',
        '</div>',
      '</div>',
      '<div class="bar-wrap">',
        '<div class="bar-bg">',
          '<div class="bar-fill ' + fillClass + '" style="width:' + fillW + '%"></div>',
        '</div>',
        '<div class="meta-marker" style="left:' + markerLeft + '%" title="Meta: ' + metaVendas + ' vendas"></div>',
      '</div>',
    '</div>'
  ].join('');
}
function renderizar() {
  const filtrados = dadosFiltrados();
  if (!filtrados.length) {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty"><strong>Nenhum dado encontrado</strong>Ajuste os filtros e tente novamente.</div>';
    return;
  }
  const tot        = agregar(filtrados);
  const totalLeads = tot.leads_bh + tot.leads_interior + tot.leads_fora;
  // Ticket médio e conversão usam apenas vendas qualificadas (>= R$2.000)
  const ticketQualif = tot.num_vendas_qualif > 0 ? tot.valor_vendido_qualif / tot.num_vendas_qualif : 0;
  const convG        = pct(tot.num_vendas_qualif, totalLeads);

  const kpiHtml = '<div class="kpi-grid">' + [
    { label:'Valor Vendido',      value:'<span class="cur">R$</span>' + formatMoeda(tot.valor_vendido),   sub: tot.num_vendas + ' vendas realizadas',        color:'var(--green)'  },
    { label:'Vendas ≥ R$2.000',   value: tot.num_vendas_qualif.toLocaleString('pt-BR'),                   sub: 'R$ ' + formatMoeda(tot.valor_vendido_qualif), color:'var(--purple)' },
    { label:'Ticket Médio Qualif',value:'<span class="cur">R$</span>' + formatMoeda(ticketQualif),        sub: 'vendas ≥ R$2.000',                            color:'var(--accent)' },
    { label:'Total de Leads',     value: totalLeads.toLocaleString('pt-BR'),                               sub: 'BH: ' + tot.leads_bh + ' · Interior: ' + tot.leads_interior + ' · Fora: ' + tot.leads_fora, color:'var(--yellow)' },
    { label:'Conversão Geral',    value: formatPct(convG),                                                 sub: 'vendas qualif. ÷ leads',                      color:'var(--orange)' },
  ].map(k => [
    '<div class="kpi-card" style="--kpi-color:' + k.color + '">',
      '<span class="kpi-label">' + k.label + '</span>',
      '<div class="kpi-value">' + k.value + '</div>',
      '<div class="kpi-sub">' + k.sub + '</div>',
    '</div>'
  ].join('')).join('') + '</div>';

  const filtroP = document.getElementById('filtroPeriodo').value;
  const porVendedor = {};
  filtrados.forEach(d => { if (!porVendedor[d.vendedor]) porVendedor[d.vendedor] = []; porVendedor[d.vendedor].push(d); });

  const ordenados = Object.entries(porVendedor)
    .map(([nome, rows]) => ({ nome, ...agregar(rows) }))
    .sort((a, b) => b.valor_vendido - a.valor_vendido);

  const cardsHtml = ordenados.map(v => {
    const totalL = v.leads_bh + v.leads_interior + v.leads_fora;
    const ticketQualif = v.num_vendas_qualif > 0 ? v.valor_vendido_qualif / v.num_vendas_qualif : 0;
    const convB  = pct(v.vendas_bh,            v.leads_bh);
    const convI  = pct(v.vendas_interior,       v.leads_interior);
    const convF  = pct(v.vendas_fora,           v.leads_fora);
    const convM  = pct(v.vendas_meta,           v.leads_meta);
    const convD  = pct(v.vendas_disparo,        v.leads_disparo);
    const convO  = pct(v.vendas_organico,       v.leads_organico);
    const convX  = pct(v.vendas_outros_origem,  v.leads_outros_origem);

    return [
      '<div class="vendedor-card" data-vendedor="' + v.nome.replace(/"/g,'&quot;') + '" data-periodo="' + filtroP + '" onclick="abrirVendas(this.dataset.vendedor, this.dataset.periodo)">',
        '<div class="vendedor-header">',
          '<span class="vendedor-name">' + v.nome + '</span>',
          '<span class="vendedor-badge">' + v.num_vendas + ' vendas</span>',
        '</div>',
        '<div class="vendedor-body">',
          '<div class="stat-row">',
            '<div class="stat-item"><span class="stat-label">Faturamento</span><div class="stat-value green">' + moedaHtml(v.valor_vendido) + '</div></div>',
            '<div class="stat-item"><span class="stat-label">Ticket Qualif.</span><div class="stat-value accent">' + moedaHtml(ticketQualif) + '</div></div>',
            '<div class="stat-item"><span class="stat-label">Leads</span><div class="stat-value">' + totalL.toLocaleString('pt-BR') + '</div></div>',
          '</div>',
          '<div class="conv-block">',
            '<div class="conv-block-title">Conversão por Região</div>',
            barRow('BH',             convB, 'fill-bh',       v.vendas_bh,            v.leads_bh,            metas.meta_bh,       v.nome, filtroP, ''),
            barRow('Interior MG',    convI, 'fill-interior', v.vendas_interior,       v.leads_interior,       metas.meta_interior, v.nome, filtroP, ''),
            barRow('Fora do Estado', convF, 'fill-fora',     v.vendas_fora,           v.leads_fora,           metas.meta_fora,     v.nome, filtroP, ''),
          '</div>',
          '<div class="conv-block">',
            '<div class="conv-block-title">Conversão por Origem</div>',
            barRow('Meta ADS',      convM, 'fill-meta',     v.vendas_meta,          v.leads_meta,          metas.meta_meta,     v.nome, filtroP, 'Meta ADS'),
            barRow('Disparo',       convD, 'fill-disparo',  v.vendas_disparo,       v.leads_disparo,       metas.meta_disparo,  v.nome, filtroP, 'Disparo'),
            barRow('Orgânico',      convO, 'fill-organico', v.vendas_organico,      v.leads_organico,      metas.meta_organico, v.nome, filtroP, 'Orgânico'),
            barRowAbsoluto('Desconhecida', v.vendas_outros_origem, 'fill-outros', metas.meta_outros, v.nome, filtroP, 'Desconhecida'),
          '</div>',
        '</div>',
        '<div class="vendedor-footer">',
          '<span class="ver-vendas">Ver todas as vendas →</span>',
          '<span class="footer-meta">' + totalL + ' leads · ' + v.num_vendas_qualif + ' qualif.</span>',
        '</div>',
      '</div>'
    ].join('');
  }).join('');

  document.getElementById('mainContent').innerHTML =
    kpiHtml +
    '<div><div class="section-header"><span class="section-title">Performance por Vendedor</span></div>' +
    '<div class="vendedor-grid">' + cardsHtml + '</div></div>';
}

// ── MODAL METAS ──
function abrirModalMetas() {
  document.getElementById('meta_bh').value       = metas.meta_bh;
  document.getElementById('meta_interior').value = metas.meta_interior;
  document.getElementById('meta_fora').value     = metas.meta_fora;
  document.getElementById('meta_meta').value     = metas.meta_meta;
  document.getElementById('meta_disparo').value  = metas.meta_disparo;
  document.getElementById('meta_organico').value = metas.meta_organico;
  document.getElementById('meta_outros').value   = metas.meta_outros;
  document.getElementById('metaSenha').value     = '';
  document.getElementById('metaMsgErro').style.display = 'none';
  document.getElementById('btnAplicarMetas').textContent = 'Salvar metas';
  document.getElementById('btnAplicarMetas').disabled = false;
  document.getElementById('modalMetas').classList.add('open');
  setTimeout(() => document.getElementById('metaSenha').focus(), 100);
}
function fecharModalMetas(e) {
  if (!e || e.target === document.getElementById('modalMetas'))
    document.getElementById('modalMetas').classList.remove('open');
}
async function aplicarMetas() {
  const senha = document.getElementById('metaSenha').value.trim();
  const erro  = document.getElementById('metaMsgErro');
  const btn   = document.getElementById('btnAplicarMetas');

  if (!senha) {
    erro.textContent = 'Digite a senha';
    erro.style.display = 'block';
    document.getElementById('metaSenha').focus();
    return;
  }

  const read = id => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? 20 : Math.max(0, Math.min(100, v)); };
  metas.meta_bh       = read('meta_bh');
  metas.meta_interior = read('meta_interior');
  metas.meta_fora     = read('meta_fora');
  metas.meta_meta     = read('meta_meta');
  metas.meta_disparo  = read('meta_disparo');
  metas.meta_organico = read('meta_organico');
  metas.meta_outros   = read('meta_outros');

  btn.textContent = 'Salvando...';
  btn.disabled = true;
  erro.style.display = 'none';

  try {
    const resp = await salvarConfigRemoto(senha);
    if (resp.status !== 'ok') {
      erro.textContent = resp.msg === 'Senha incorreta' ? 'Senha incorreta' : (resp.msg || 'Erro ao salvar');
      erro.style.display = 'block';
      btn.textContent = 'Salvar metas';
      btn.disabled = false;
      document.getElementById('metaSenha').value = '';
      document.getElementById('metaSenha').focus();
      return;
    }
  } catch(e) {
    erro.textContent = 'Erro de conexão';
    erro.style.display = 'block';
    btn.textContent = 'Salvar metas';
    btn.disabled = false;
    return;
  }

  btn.textContent = '✓ Salvo!';
  setTimeout(() => {
    document.getElementById('modalMetas').classList.remove('open');
    btn.textContent = 'Salvar metas';
    btn.disabled = false;
    renderizar();
  }, 800);
}

// ── MODAL VENDAS POR ORIGEM ──
function abrirVendasOrigem(vendedor, mesAno, origem) {
  document.getElementById('modalVendasTitle').textContent = vendedor + ' — ' + origem;
  document.getElementById('modalVendasSub').textContent   = mesAno === 'todos' ? 'Todo o período' : formatMesAno(mesAno);
  document.getElementById('modalVendasBody').innerHTML    =
    '<div class="loading"><div class="spinner"></div><span>Carregando vendas...</span></div>';
  document.getElementById('modalVendas').classList.add('open');

  let url = API_URL + '?acao=vendas_detalhe&vendedor=' + encodeURIComponent(vendedor) + '&origem=' + encodeURIComponent(origem);
  if (mesAno && mesAno !== 'todos') url += '&mes_ano=' + encodeURIComponent(mesAno);

  _carregarModalVendas(url);
}

// ── MODAL VENDAS (todas) ──
async function abrirVendas(vendedor, mesAno) {
  document.getElementById('modalVendasTitle').textContent = vendedor;
  document.getElementById('modalVendasSub').textContent   = mesAno === 'todos' ? 'Todo o período' : formatMesAno(mesAno);
  document.getElementById('modalVendasBody').innerHTML    =
    '<div class="loading"><div class="spinner"></div><span>Carregando vendas...</span></div>';
  document.getElementById('modalVendas').classList.add('open');

  let url = API_URL + '?acao=vendas_detalhe&vendedor=' + encodeURIComponent(vendedor);
  if (mesAno && mesAno !== 'todos') url += '&mes_ano=' + encodeURIComponent(mesAno);

  _carregarModalVendas(url);
}

async function _carregarModalVendas(url) {
  try {
    const res  = await fetch(url);
    const text = await res.text(); // lê como texto primeiro para debug
    console.log('[abrirVendas] URL:', url);
    console.log('[abrirVendas] Status:', res.status);
    console.log('[abrirVendas] Resposta bruta:', text.substring(0, 300));

    let dados;
    try {
      const parsed = JSON.parse(text);
      console.log('[abrirVendas] Parsed:', parsed);
      // O Script C pode retornar o array diretamente ou dentro de { data: [...] }
      if (Array.isArray(parsed)) {
        dados = parsed;
      } else if (parsed && Array.isArray(parsed.data)) {
        dados = parsed.data;
      } else if (parsed && parsed.status === 'error') {
        throw new Error(parsed.msg || 'Erro retornado pelo servidor');
      } else {
        // Resposta inesperada — mostra para debug
        document.getElementById('modalVendasBody').innerHTML =
          '<div class="empty"><strong>Resposta inesperada do servidor</strong>' +
          '<pre style="margin-top:12px;font-size:11px;color:var(--muted2);text-align:left;white-space:pre-wrap;word-break:break-all">' +
          text.substring(0, 500) + '</pre></div>';
        return;
      }
    } catch(parseErr) {
      document.getElementById('modalVendasBody').innerHTML =
        '<div class="empty"><strong>Erro ao interpretar resposta</strong>' +
        '<pre style="margin-top:12px;font-size:11px;color:var(--muted2);text-align:left;white-space:pre-wrap;word-break:break-all">' +
        text.substring(0, 500) + '</pre></div>';
      return;
    }

    if (!dados || !dados.length) {
      document.getElementById('modalVendasBody').innerHTML =
        '<div class="empty"><strong>Nenhuma venda encontrada</strong>' +
        '<span style="display:block;margin-top:8px">para este período.</span>' +
        '<details style="margin-top:16px;text-align:left"><summary style="font-size:11px;color:var(--muted);cursor:pointer">Debug (resposta do servidor)</summary>' +
        '<pre style="margin-top:8px;font-size:10px;color:var(--muted2);white-space:pre-wrap;word-break:break-all">' + text.substring(0, 800) + '</pre></details></div>';
      return;
    }

    dados.sort((a, b) => new Date(b.data) - new Date(a.data));
    const totalModal = dados.reduce((s, d) => s + (Number(d.valorLiquido) || 0), 0);
    window._vendasModal = dados;

    const rows = dados.map((d, i) =>
      '<tr id="vr-' + i + '">' +
        '<td>' + (d.nome || '—') + '</td>' +
        '<td class="muted" style="font-family:monospace;font-size:12px">' + (d.telefone || '—') + '</td>' +
        '<td class="muted">' + formatData(d.data) + '</td>' +
        '<td class="green">R$ ' + formatMoeda(d.valorLiquido) + '</td>' +
        '<td>' + tagRegiao(d.regiao) + '</td>' +
        '<td><button onclick="deletarVenda(' + i + ',this)" style="background:none;border:1px solid var(--border);color:var(--muted);padding:3px 9px;border-radius:6px;cursor:pointer;font-size:11px;transition:all 0.2s" onmouseover="this.style.borderColor=\'var(--red)\';this.style.color=\'var(--red)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--muted)\'">🗑 Apagar</button></td>' +
      '</tr>'
    ).join('');

    document.getElementById('modalVendasBody').innerHTML =
      '<div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">' +
        '<span style="font-size:12px;color:var(--muted)" id="modalCount">' + dados.length + ' vendas encontradas</span>' +
        '<span style="font-size:14px;font-weight:700;color:var(--green)" id="modalTotal">R$ ' + formatMoeda(totalModal) + '</span>' +
      '</div>' +
      '<table><thead><tr><th>Nome</th><th>Telefone</th><th>Data</th><th>Valor</th><th>Região</th><th></th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>';

  } catch(e) {
    document.getElementById('modalVendasBody').innerHTML =
      '<div class="empty"><strong>Erro ao carregar</strong>' + e.message + '</div>';
  }
}

async function deletarVenda(idx, btn) {
  const venda = window._vendasModal[idx];
  if (!venda) return;
  const senha = prompt('Apagar a venda de ' + venda.nome + ' (R$ ' + formatMoeda(venda.valorLiquido) + ')?\n\nDigite a senha para confirmar:');
  if (!senha) return;
  btn.disabled = true; btn.textContent = '...';
  try {
    const res  = await fetch(API_URL, { method:'post', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({ tipo:'delete_venda', senha, prontuario:venda.prontuario, data:venda.data, valorLiquido:venda.valorLiquido.toString() }) });
    const resp = await res.json();
    if (resp.status === 'ok') {
      const row = document.getElementById('vr-' + idx);
      if (row) row.style.opacity = '0.3';
      btn.textContent = '✓ Apagado'; btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)';
      window._vendasModal[idx]._deleted = true;
      const rest = window._vendasModal.filter(v => !v._deleted);
      const ct = document.getElementById('modalCount'), tt = document.getElementById('modalTotal');
      if (ct) ct.textContent = rest.length + ' vendas encontradas';
      if (tt) tt.textContent = 'R$ ' + formatMoeda(rest.reduce((s,v) => s + (v.valorLiquido||0), 0));
    } else { alert(resp.msg === 'Senha incorreta' ? 'Senha incorreta!' : 'Erro: ' + resp.msg); btn.disabled = false; btn.textContent = '🗑 Apagar'; }
  } catch(e) { alert('Erro ao apagar: ' + e.message); btn.disabled = false; btn.textContent = '🗑 Apagar'; }
}

function fecharModalVendas(e) {
  if (!e || e.target === document.getElementById('modalVendas'))
    document.getElementById('modalVendas').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { fecharModalVendas(); fecharModalMetas(); } });
document.getElementById('filtroVendedor').addEventListener('change', renderizar);
document.getElementById('filtroPeriodo').addEventListener('change', renderizar);

carregarDados();
</script>
